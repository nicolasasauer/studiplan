name: Flutter iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-build-ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-build-ios.yml'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Initialize iOS platform (if not present)
        working-directory: flutter_app
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: flutter_app
        run: flutter test

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Pod install
        working-directory: flutter_app/ios
        run: pod install

      - name: Build iOS (no codesign)
        working-directory: flutter_app
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.sha }}
          path: flutter_app/build/ios/iphoneos/Runner.app
          retention-days: 30

