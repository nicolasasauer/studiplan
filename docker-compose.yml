services:
  studiumsplaner:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: studiumsplaner
    ports:
      - "3000:80"
    
    environment:
      NODE_ENV: production
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
